<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor de QR Code</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<div class="container">

    <h1>Leitor de QR Code</h1>

    <div id="reader"></div>

    <div class="status">
        Aponte a câmera para os QR Codes
    </div>

    <div class="lista">

        <div class="item" id="qwertyuio">
            ❌ qwertyuio
        </div>

        <div class="item" id="oiuyrewq">
            ❌ oiuyrewq
        </div>

        <div class="item" id="asdfghjkl">
            ❌ asdfghjkl
        </div>

        <div class="item" id="lkjhgfdsa">
            ❌ lkjhgfdsa
        </div>

    </div>

    <div id="resultado"></div>

</div>

<script>

const codigosNecessarios = [
    "qwertyuio",
    "oiuyrewq",
    "asdfghjkl",
    "lkjhgfdsa"
];

const lidos = new Set();

function verificarFinal(){

    if(lidos.size === codigosNecessarios.length){

        document.getElementById("resultado").innerHTML = `
            <div class="sucesso">
                ✅ Códigos lidos com sucesso!
            </div>
        `;

        html5QrCode.stop();

    }

}

function onScanSuccess(decodedText){

    console.log(decodedText);

    if(
        codigosNecessarios.includes(decodedText)
        &&
        !lidos.has(decodedText)
    ){

        lidos.add(decodedText);

        const item = document.getElementById(decodedText);

        item.classList.add("lido");
        item.innerHTML = "✅ " + decodedText;

        verificarFinal();

    }

}

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
    { facingMode: "environment" },
    {
        fps:10,
        qrbox:{
            width:250,
            height:250
        }
    },
    onScanSuccess
).catch(err=>{
    console.error(err);
    alert("Não foi possível acessar a câmera.");
});

</script>

</body>
</html>
